<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Habitacion VR</title>
    <meta name="description" content="Habitacion VR with A-Frame">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      #hotbar {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 1000;
        pointer-events: none;
        font-family: 'Rajdhani', sans-serif;
      }

      .hotbar-slot {
        width: 72px;
        height: 72px;
        background: rgba(0, 0, 0, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        overflow: hidden;
      }

      .hotbar-slot.has-item {
        border-color: rgba(255, 200, 60, 0.75);
        background: rgba(20, 15, 0, 0.82);
        box-shadow: 0 0 12px rgba(255, 180, 0, 0.3), inset 0 0 20px rgba(255,180,0,0.04);
      }

      .hotbar-slot .slot-number {
        position: absolute;
        top: 4px;
        left: 7px;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        font-weight: 700;
        line-height: 1;
      }

      .hotbar-slot .slot-icon {
        font-size: 28px;
        line-height: 1;
        opacity: 0;
        transform: scale(0.6);
        transition: opacity 0.3s, transform 0.3s;
        filter: drop-shadow(0 0 5px rgba(255,200,60,0.5));
      }

      .hotbar-slot.has-item .slot-icon {
        opacity: 1;
        transform: scale(1);
      }

      .hotbar-slot .slot-label {
        font-size: 9px;
        color: rgba(255, 200, 60, 0.9);
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-top: 4px;
        opacity: 0;
        transition: opacity 0.3s;
        text-transform: uppercase;
        text-align: center;
        padding: 0 3px;
        line-height: 1.1;
      }

      .hotbar-slot.has-item .slot-label { opacity: 1; }

      #pickup-notice {
        position: fixed;
        bottom: 105px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(0,0,0,0.78);
        color: #ffc83c;
        font-family: 'Rajdhani', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 7px 22px;
        border-radius: 4px;
        border: 1px solid rgba(255,200,60,0.4);
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        transition: opacity 0.3s, transform 0.3s;
        white-space: nowrap;
      }

      #pickup-notice.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
      }

      #interact-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(-50% + 38px));
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.09em;
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        transition: opacity 0.2s;
        text-transform: uppercase;
        background: rgba(0,0,0,0.55);
        padding: 4px 14px;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.12);
      }

      #interact-hint.show { opacity: 1; }

      #instructions {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: 'Rajdhani', sans-serif;
        z-index: 999;
        pointer-events: none;
        font-size: 14px;
        line-height: 1.8;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      }

      #instructions strong {
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #ffc83c;
        display: block;
        margin-bottom: 2px;
      }

      #timer {
        position: fixed;
        top: 20px;
        right: 20px;
        color: #ff4444;
        font-family: 'Rajdhani', sans-serif;
        font-size: 24px;
        font-weight: 700;
        z-index: 999;
        pointer-events: none;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        background: rgba(0,0,0,0.5);
        padding: 5px 15px;
        border-radius: 4px;
        border: 1px solid rgba(255,68,68,0.5);
      }

      #timer.warning { color: #ff8800; border-color: rgba(255,136,0,0.5); }
      #timer.critical { color: #ff0000; animation: pulse 0.5s infinite; border-color: rgba(255,0,0,0.8); }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="habitacion-model" src="models/building_hallway.glb"></a-asset-item>
        <a-asset-item id="pared-model" src="models/pared-mesh.glb"></a-asset-item>
        <a-asset-item id="wire-cutter-model" src="models/wire_cutter.glb"></a-asset-item>
        <a-asset-item id="key-model" src="models/key.glb"></a-asset-item>
      </a-assets>

      <a-entity id="habitacion" gltf-model="#habitacion-model" position="9.5, 0, 3.5" scale="0.025 0.025 0.025" shadow="cast: true; receive: true"></a-entity>
      <a-entity id="pared-final" gltf-model="#pared-model" position="-3.55 3.401 3.599" rotation="0 90 0" scale="0.025 0.025 0.025" shadow="cast: true; receive: true"></a-entity>

      <a-entity id="wire-cutter" gltf-model="#wire-cutter-model" position="23.05 1.87 4.60" rotation="0 -90 0" scale="0.002 0.002 0.002" class="pickable" data-item="wire_cutter" data-label="Wire Cutter" data-icon="✂️" shadow="cast: true; receive: true"></a-entity>
      <a-entity id="key" gltf-model="#key-model" position="11.193 0.961 1.45" rotation="30 0 -90" scale="0.0002 0.0002 0.0002" class="pickable" data-item="hallway_key" data-label="Llave de Pasillo" data-icon="🗝️" shadow="cast: true; receive: true"></a-entity>

      <a-entity id="boton-escaleras" position="-3.35 1.5 3.45" rotation="0 90 0" visible="false">
        <a-plane width="0.5" height="0.2" color="#222222" opacity="0.85" class="clickable" cursor-listener></a-plane>
        <a-text value="Ir a Escaleras" align="center" color="#FFFFFF" width="1.8" position="0 0 0.01"></a-text>
      </a-entity>

      <a-entity id="boton-habitacion" position="2.002 1.5 5.483" rotation="0 180 0">
        <a-plane width="0.7" height="0.25" color="#222222" opacity="0.85" class="clickable" cursor-listener></a-plane>
        <a-text value="Volver a Habitacion" align="center" color="#FFFFFF" width="2" position="0 0 0.01"></a-text>
      </a-entity>

      <!-- Escape Button (requires keycard-level2) -->
      <a-entity id="boton-escape" position="19.54 1.5 5.429" rotation="0 180 0">
        <a-plane width="0.8" height="0.3" color="#880000" opacity="0.85" class="clickable"></a-plane>
        <a-text value="ESCAPAR" align="center" color="#FF4444" width="2.5" position="0 0 0.01"></a-text>
      </a-entity>

      <a-box class="wall" position="10 1 5.69" width="30" height="3" depth="0.5" visible="false"></a-box>
      <a-box class="wall" position="10 1 1.284" width="30" height="3" depth="0.5" visible="false"></a-box>
      <a-box class="wall" position="-3.72 1 5" width="0.5" height="3" depth="30" visible="false"></a-box>
      <a-box class="wall" position="23.46 1 5" width="0.5" height="3" depth="30" visible="false"></a-box>

      <a-plane position="0 0.01 0" rotation="-90 0 0" width="100" height="100" visible="false" shadow="receive: true"></a-plane>

      <a-entity id="player-rig" movement-controls="speed: 0.15; fly: false;" position="0 0 5">
      <a-entity id="camera"
                camera
                position="0 1.6 0"
                look-controls="pointerLockEnabled: true"
                wasd-controls="enabled: false; acceleration: 30">

        <a-cursor id="cursor"
                  color="#FFF"
                  opacity="0.5"
                  scale="0.4 0.4 0.4"
                  fuse="false"
                  raycaster="objects: .pickable, .clickable; far: 0.5">
        </a-cursor>

        <!-- COLLISION SENSOR -->
        <a-entity id="sensor"
                  raycaster="objects: .wall; far: 0.6; showLine: false">
        </a-entity>

      </a-entity>

      <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; color: #FFFFFF; intensity: 0.8" position="-1 2 1" cast-shadow="true"></a-entity>
      <a-sky color="#1a1a2e"></a-sky>
    </a-scene>

    <div id="hotbar">
      <div class="hotbar-slot" id="slot-1"><span class="slot-number">1</span><span class="slot-icon" id="slot-1-icon"></span><span class="slot-label" id="slot-1-label"></span></div>
      <div class="hotbar-slot" id="slot-2"><span class="slot-number">2</span><span class="slot-icon" id="slot-2-icon"></span><span class="slot-label" id="slot-2-label"></span></div>
      <div class="hotbar-slot" id="slot-3"><span class="slot-number">3</span><span class="slot-icon" id="slot-3-icon"></span><span class="slot-label" id="slot-3-label"></span></div>
      <div class="hotbar-slot" id="slot-4"><span class="slot-number">4</span><span class="slot-icon" id="slot-4-icon"></span><span class="slot-label" id="slot-4-label"></span></div>
      <div class="hotbar-slot" id="slot-5"><span class="slot-number">5</span><span class="slot-icon" id="slot-5-icon"></span><span class="slot-label" id="slot-5-label"></span></div>
    </div>

    <div id="pickup-notice"></div>
    <div id="interact-hint">[E] Recoger</div>

    <div id="instructions">
      <strong>CONTROLES</strong>
      W/A/S/D - Moverse<br>
      Raton - Mirar<br>
      E - Recoger objeto<br>
      Click - Bloquear cursor
    </div>

    <div id="timer"></div>

    <script>
      var GAME_STORAGE_KEY = 'titanic_game_state';
      var TIMER_DURATION = 5 * 60 * 1000;

      function loadGameState() {
        var saved = localStorage.getItem(GAME_STORAGE_KEY);
        if (saved) return JSON.parse(saved);
        var newState = { startTime: Date.now(), inventory: [] };
        localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(newState));
        return newState;
      }

      function saveGameState(state) {
        localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(state));
      }

      var gameState = loadGameState();
      var inventory = gameState.inventory || [];
      var SLOT_COUNT = 5;
      var timeRemaining = TIMER_DURATION;
      var timerInterval = null;

      function formatTime(ms) {
        var totalSeconds = Math.floor(ms / 1000);
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
      }

      function updateTimerDisplay() {
        var timerEl = document.getElementById('timer');
        if (!timerEl) return;
        timerEl.textContent = formatTime(timeRemaining);
        timerEl.classList.remove('warning', 'critical');
        if (timeRemaining <= 60000) timerEl.classList.add('critical');
        else if (timeRemaining <= 120000) timerEl.classList.add('warning');
      }

      function startTimer() {
        var elapsed = Date.now() - gameState.startTime;
        timeRemaining = Math.max(0, TIMER_DURATION - elapsed);
        updateTimerDisplay();
        timerInterval = setInterval(function() {
          timeRemaining -= 1000;
          updateTimerDisplay();
          gameState.startTime = Date.now() - (TIMER_DURATION - timeRemaining);
          saveGameState(gameState);
          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            alert('TIEMPO AGOTADO!');
            localStorage.removeItem(GAME_STORAGE_KEY);
            window.location.href = 'juego.html';
          }
        }, 1000);
      }

      function updateHotbar() {
        for (var i = 0; i < SLOT_COUNT; i++) {
          var slot = document.getElementById('slot-' + (i + 1));
          var iconEl = document.getElementById('slot-' + (i + 1) + '-icon');
          var labelEl = document.getElementById('slot-' + (i + 1) + '-label');
          var entry = inventory[i];
          if (entry) {
            slot.classList.add('has-item');
            iconEl.textContent = entry.icon;
            labelEl.textContent = entry.label;
          } else {
            slot.classList.remove('has-item');
            iconEl.textContent = '';
            labelEl.textContent = '';
          }
        }
      }

      function saveInventory() {
        gameState.inventory = inventory;
        saveGameState(gameState);
      }

      var noticeTimer = null;
      function showNotice(text) {
        var el = document.getElementById('pickup-notice');
        el.textContent = text;
        el.classList.add('show');
        if (noticeTimer) clearTimeout(noticeTimer);
        noticeTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
      }

      function pickupItem(entity) {
        var item = entity.getAttribute('data-item');
        var label = entity.getAttribute('data-label');
        var icon = entity.getAttribute('data-icon');
        if (!item) return;
        for (var j = 0; j < inventory.length; j++) {
          if (inventory[j].item === item) return;
        }
        if (inventory.length >= SLOT_COUNT) {
          showNotice('Inventario lleno');
          return;
        }
        inventory.push({ item: item, label: label, icon: icon });
        entity.setAttribute('visible', 'false');
        entity.removeAttribute('class');
        updateHotbar();
        saveInventory();
        showNotice('+ ' + icon + ' ' + label);

        if (item === 'hallway_key') {
          setTimeout(function() {
            var btn = document.querySelector('#boton-escaleras');
            if (btn) btn.setAttribute('visible', 'true');
            showNotice('🗝️ Pasaje desbloqueado');
          }, 600);
        }
      }

      var hint = document.getElementById('interact-hint');
      var hoveredPickable = null;

      document.addEventListener('keydown', function(e) {
        if ((e.key === 'e' || e.key === 'E') && hoveredPickable) {
          pickupItem(hoveredPickable);
          hoveredPickable = null;
          hint.classList.remove('show');
        }
      });

      document.querySelector('a-scene').addEventListener('loaded', function() {
        function registerPickable(el) {
          el.addEventListener('mouseenter', function() {
            hoveredPickable = this;
            hint.textContent = '[E] ' + this.getAttribute('data-label');
            hint.classList.add('show');
          });
          el.addEventListener('mouseleave', function() {
            if (hoveredPickable === this) { hoveredPickable = null; hint.classList.remove('show'); }
          });
          el.addEventListener('click', function() {
            pickupItem(this);
            hoveredPickable = null;
            hint.classList.remove('show');
          });
        }

        var pickables = document.querySelectorAll('.pickable');
        for (var k = 0; k < pickables.length; k++) {
          registerPickable(pickables[k]);
        }

        var boton = document.querySelector('#boton-escaleras');
        boton.addEventListener('click', function() { window.location.href = 'escaleras-3.html'; });
        var botonPlane = boton.querySelector('a-plane');
        botonPlane.addEventListener('mouseenter', function() { this.setAttribute('color', '#444444'); });
        botonPlane.addEventListener('mouseleave', function() { this.setAttribute('color', '#222222'); });

        var botonHabitacion = document.querySelector('#boton-habitacion');
        botonHabitacion.addEventListener('click', function() { window.location.href = 'juego.html'; });
        var botonHabitacionPlane = botonHabitacion.querySelector('a-plane');
        botonHabitacionPlane.addEventListener('mouseenter', function() { this.setAttribute('color', '#444444'); });
        botonHabitacionPlane.addEventListener('mouseleave', function() { this.setAttribute('color', '#222222'); });

        // Escape button handler - requires keycard-level2
        var botonEscape = document.querySelector('#boton-escape');
        botonEscape.addEventListener('click', function() {
          var hasKeycardLevel2 = false;
          for (var p = 0; p < inventory.length; p++) {
            if (inventory[p].item === 'keycard-level2') { hasKeycardLevel2 = true; break; }
          }
          if (hasKeycardLevel2) {
            // Player escapes!
            localStorage.removeItem(GAME_STORAGE_KEY);
            window.location.href = 'final.html';
          } else {
            showNotice('🔒 Necesitas KEYCARD NIVEL 2 para escapar');
          }
        });
        var botonEscapePlane = botonEscape.querySelector('a-plane');
        botonEscapePlane.addEventListener('mouseenter', function() { this.setAttribute('color', '#aa0000'); });
        botonEscapePlane.addEventListener('mouseleave', function() { this.setAttribute('color', '#880000'); });

        for (var m = 0; m < inventory.length; m++) {
          var itemEl = document.querySelector('[data-item="' + inventory[m].item + '"]');
          if (itemEl) itemEl.setAttribute('visible', 'false');
        }

        var hasHallwayKey = false;
        for (var p = 0; p < inventory.length; p++) {
          if (inventory[p].item === 'hallway_key') { hasHallwayKey = true; break; }
        }
        if (hasHallwayKey) {
          var keyBtn = document.querySelector('#boton-escaleras');
          if (keyBtn) keyBtn.setAttribute('visible', 'true');
        }
      });

      const rig = document.querySelector('#player-rig');
      const sensor = document.querySelector('#sensor');
      let lastValidPosition = new THREE.Vector3();

      AFRAME.registerComponent('col-check', {
        tick: function () {

          const raycaster = sensor.components.raycaster;
          if (!raycaster) return;

          const currentPosition = rig.object3D.position;

          const movementDirection = new THREE.Vector3()
            .copy(currentPosition)
            .sub(lastValidPosition)
            .normalize();

          if (movementDirection.length() > 0) {

            sensor.setAttribute('raycaster', 'direction',
              movementDirection.x + ' ' +
              movementDirection.y + ' ' +
              movementDirection.z
            );

            if (raycaster.intersections.length > 0) {
              rig.object3D.position.copy(lastValidPosition);
            } else {
              lastValidPosition.copy(currentPosition);
            }

          } else {
            lastValidPosition.copy(currentPosition);
          }
        }
      });

      document.querySelector('a-scene').setAttribute('col-check', '');

      updateHotbar();
      startTimer();
    </script>

  </body>
</html>
