<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Habitacion VR</title>
    <meta name="description" content="Habitacion VR with A-Frame">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── HOTBAR ── */
      #hotbar {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 1000;
        pointer-events: none;
        font-family: 'Rajdhani', sans-serif;
      }

      .hotbar-slot {
        width: 72px;
        height: 72px;
        background: rgba(0, 0, 0, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        overflow: hidden;
      }

      .hotbar-slot.has-item {
        border-color: rgba(255, 200, 60, 0.75);
        background: rgba(20, 15, 0, 0.82);
        box-shadow: 0 0 12px rgba(255, 180, 0, 0.3), inset 0 0 20px rgba(255,180,0,0.04);
      }

      .hotbar-slot .slot-number {
        position: absolute;
        top: 4px;
        left: 7px;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        font-weight: 700;
        line-height: 1;
      }

      .hotbar-slot .slot-icon {
        font-size: 28px;
        line-height: 1;
        opacity: 0;
        transform: scale(0.6);
        transition: opacity 0.3s, transform 0.3s;
        filter: drop-shadow(0 0 5px rgba(255,200,60,0.5));
      }

      .hotbar-slot.has-item .slot-icon {
        opacity: 1;
        transform: scale(1);
      }

      .hotbar-slot .slot-label {
        font-size: 9px;
        color: rgba(255, 200, 60, 0.9);
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-top: 4px;
        opacity: 0;
        transition: opacity 0.3s;
        text-transform: uppercase;
        text-align: center;
        padding: 0 3px;
        line-height: 1.1;
      }

      .hotbar-slot.has-item .slot-label {
        opacity: 1;
      }

      /* ── PICKUP NOTICE ── */
      #pickup-notice {
        position: fixed;
        bottom: 105px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(0,0,0,0.78);
        color: #ffc83c;
        font-family: 'Rajdhani', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 7px 22px;
        border-radius: 4px;
        border: 1px solid rgba(255,200,60,0.4);
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        transition: opacity 0.3s, transform 0.3s;
        white-space: nowrap;
      }

      #pickup-notice.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
      }

      /* ── INTERACT HINT ── */
      #interact-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(-50% + 38px));
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.09em;
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        transition: opacity 0.2s;
        text-transform: uppercase;
        background: rgba(0,0,0,0.55);
        padding: 4px 14px;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.12);
      }

      #interact-hint.show { opacity: 1; }

      /* ── INSTRUCTIONS ── */
      #instructions {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: 'Rajdhani', sans-serif;
        z-index: 999;
        pointer-events: none;
        font-size: 14px;
        line-height: 1.8;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      }

      #instructions strong {
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #ffc83c;
        display: block;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <a-scene>
      
      <!-- Assets -->
      <a-assets>
        <a-asset-item id="habitacion-model" src="models/building_hallway.glb"></a-asset-item>
        <a-asset-item id="pared-model" src="models/pared-mesh.glb"></a-asset-item>
        <a-asset-item id="wire-cutter-model" src="models/wire_cutter.glb"></a-asset-item>
        <a-asset-item id="key-model" src="models/key.glb"></a-asset-item>
      </a-assets>

      <!-- Room Model -->
      <a-entity 
        id="habitacion"
        gltf-model="#habitacion-model"
        position="9.5, 0, 3.5"
        scale="0.025 0.025 0.025"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Pared al final del pasillo -->
      <a-entity 
        id="pared-final"
        gltf-model="#pared-model"
        position="-3.55 3.401 3.599"
        rotation="0 90 0"
        scale="0.025 0.025 0.025"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Wire Cutter (recogible) -->
      <a-entity
        id="wire-cutter"
        gltf-model="#wire-cutter-model"
        position="23.05 1.87 4.60"
        rotation="0 -90 0"
        scale="0.002 0.002 0.002"
        class="pickable"
        data-item="wire_cutter"
        data-label="Wire Cutter"
        data-icon="✂️"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Key (recogible) -->
      <a-entity
        id="key"
        gltf-model="#key-model"
        position="11.193 0.961 1.45"
        rotation="30 0 -90"
        scale="0.0002 0.0002 0.0002"
        class="pickable"
        data-item="key"
        data-label="Key"
        data-icon="🗝️"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Botón escaleras (oculto hasta tener la llave) -->
      <a-entity
        id="boton-escaleras"
        position="-3.35 1.1 3.45"
        rotation="0 90 0"
        visible="false">

        <a-plane
          width="0.5"
          height="0.2"
          color="#222222"
          opacity="0.85"
          class="clickable"
          cursor-listener>
        </a-plane>

        <a-text
          value="Ir a Escaleras"
          align="center"
          color="#FFFFFF"
          width="1.8"
          position="0 0 0.01">
        </a-text>

      </a-entity>

      <!-- Floor -->
      <a-plane 
        position="0 0.01 0" 
        rotation="-90 0 0" 
        width="100" 
        height="100" 
        visible="false"
        shadow="receive: true">
      </a-plane>

      <!-- Player Rig -->
      <a-entity 
        id="player-rig"
        movement-controls="speed: 0.15; fly: false;"
        position="0 0 5">
        
        <a-entity 
          id="camera"
          camera 
          position="0 1.6 0" 
          look-controls="pointerLockEnabled: true"
          wasd-controls="enabled: false; acceleration: 30">
          
          <!-- Cursor con raycaster solo a .pickable y .clickable, máx 4m -->
          <a-cursor 
            id="cursor"
            color="#FFF" 
            opacity="0.5"
            scale="0.4 0.4 0.4"
            fuse="false"
            raycaster="objects: .pickable, .clickable; far: 0.5">
          </a-cursor>
        </a-entity>
        
        <a-sphere 
          radius="0.5" 
          position="0 0 0" 
          visible="false"
          class="player-collider">
        </a-sphere>
        
      </a-entity>

      <!-- Lighting -->
      <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; color: #FFFFFF; intensity: 0.8" position="-1 2 1" cast-shadow="true"></a-entity>

      <!-- Sky -->
      <a-sky color="#1a1a2e"></a-sky>

    </a-scene>

    <!-- ── HOTBAR ── -->
    <div id="hotbar">
      <div class="hotbar-slot" id="slot-1">
        <span class="slot-number">1</span>
        <span class="slot-icon" id="slot-1-icon"></span>
        <span class="slot-label" id="slot-1-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-2">
        <span class="slot-number">2</span>
        <span class="slot-icon" id="slot-2-icon"></span>
        <span class="slot-label" id="slot-2-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-3">
        <span class="slot-number">3</span>
        <span class="slot-icon" id="slot-3-icon"></span>
        <span class="slot-label" id="slot-3-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-4">
        <span class="slot-number">4</span>
        <span class="slot-icon" id="slot-4-icon"></span>
        <span class="slot-label" id="slot-4-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-5">
        <span class="slot-number">5</span>
        <span class="slot-icon" id="slot-5-icon"></span>
        <span class="slot-label" id="slot-5-label"></span>
      </div>
    </div>

    <!-- Aviso recogida -->
    <div id="pickup-notice"></div>

    <!-- Hint de interacción -->
    <div id="interact-hint">[ E ] Recoger</div>

    <!-- Instrucciones -->
    <div id="instructions">
      <strong>CONTROLES</strong>
      W/A/S/D — Moverse<br>
      Ratón — Mirar<br>
      E — Recoger objeto<br>
      Click — Bloquear cursor
    </div>

    <script>
      // ─────────────────────────────────────────
      //  INVENTARIO  (se limpia en cada recarga)
      // ─────────────────────────────────────────
      const inventory = [];
      const SLOT_COUNT = 5;

      // ── Actualizar hotbar visual ──
      function updateHotbar() {
        for (let i = 0; i < SLOT_COUNT; i++) {
          const slot    = document.getElementById(`slot-${i + 1}`);
          const iconEl  = document.getElementById(`slot-${i + 1}-icon`);
          const labelEl = document.getElementById(`slot-${i + 1}-label`);
          const entry   = inventory[i];
          if (entry) {
            slot.classList.add('has-item');
            iconEl.textContent  = entry.icon;
            labelEl.textContent = entry.label;
          } else {
            slot.classList.remove('has-item');
            iconEl.textContent  = '';
            labelEl.textContent = '';
          }
        }
      }

      // ── Mostrar aviso de recogida ──
      let noticeTimer = null;
      function showNotice(text) {
        const el = document.getElementById('pickup-notice');
        el.textContent = text;
        el.classList.add('show');
        if (noticeTimer) clearTimeout(noticeTimer);
        noticeTimer = setTimeout(() => el.classList.remove('show'), 2400);
      }

      // ── Lógica de recogida ──
      function pickupItem(entity) {
        const item  = entity.getAttribute('data-item');
        const label = entity.getAttribute('data-label');
        const icon  = entity.getAttribute('data-icon');

        if (!item) return;
        if (inventory.find(e => e.item === item)) return; // ya recogido
        if (inventory.length >= SLOT_COUNT) {
          showNotice('⚠  Inventario lleno');
          return;
        }

        // Añadir al inventario
        inventory.push({ item, label, icon });

        // Ocultar objeto del mundo
        entity.setAttribute('visible', 'false');
        entity.classList.remove('pickable');
        entity.removeAttribute('class');   // quitar de raycaster

        updateHotbar();
        showNotice(`+  ${icon}  ${label} recogido`);

        // Desbloquear botón si recogemos la llave
        if (item === 'key') {
          setTimeout(() => {
            document.querySelector('#boton-escaleras').setAttribute('visible', 'true');
            showNotice('🗝️  Llave obtenida — pasaje desbloqueado');
          }, 600);
        }
      }

      // ─────────────────────────────────────────
      //  EVENTOS DE ESCENA
      // ─────────────────────────────────────────
      const hint = document.getElementById('interact-hint');
      let hoveredPickable = null;

      // Tecla E para recoger
      document.addEventListener('keydown', (e) => {
        if ((e.key === 'e' || e.key === 'E') && hoveredPickable) {
          pickupItem(hoveredPickable);
          hoveredPickable = null;
          hint.classList.remove('show');
        }
      });

      document.querySelector('a-scene').addEventListener('loaded', () => {

        // Registrar eventos en los objetos recogibles
        function registerPickable(el) {
          el.addEventListener('mouseenter', function () {
            hoveredPickable = this;
            hint.textContent = `[ E ]  Recoger ${this.getAttribute('data-label')}`;
            hint.classList.add('show');
          });
          el.addEventListener('mouseleave', function () {
            if (hoveredPickable === this) {
              hoveredPickable = null;
              hint.classList.remove('show');
            }
          });
          // Click también recoge
          el.addEventListener('click', function () {
            pickupItem(this);
            hoveredPickable = null;
            hint.classList.remove('show');
          });
        }

        document.querySelectorAll('.pickable').forEach(registerPickable);

        // Botón de escaleras
        const boton = document.querySelector('#boton-escaleras');
        boton.addEventListener('click', () => {
          window.location.href = 'escaleras-3.html';
        });

        const botonPlane = boton.querySelector('a-plane');
        botonPlane.addEventListener('mouseenter', function () {
          this.setAttribute('color', '#444444');
        });
        botonPlane.addEventListener('mouseleave', function () {
          this.setAttribute('color', '#222222');
        });

      });

      // Render inicial (slots vacíos)
      updateHotbar();
    </script>

  </body>
</html>
