html<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Habitacion VR</title>
    <meta name="description" content="Habitacion VR with A-Frame">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <!-- Assets -->
      <a-assets>
        <a-asset-item id="habitacion-model" src="models/building_hallway.glb"></a-asset-item>
        <a-asset-item id="pared-model" src="models/pared-mesh.glb"></a-asset-item>
      </a-assets>

      <!-- Room Model -->
      <a-entity 
        id="habitacion"
        gltf-model="#habitacion-model"
        position="9.5, 0, 3.5"
        scale="0.025 0.025 0.025"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Pared al final del pasillo -->
      <a-entity 
        id="pared-final"
        gltf-model="#pared-model"
        position="-3.55 3.401 3.599"
        rotation="0 90 0"
        scale="0.025 0.025 0.025"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Botón 1 - Volver al pasillo -->
      <a-entity
        id="boton-escaleras"
        position="-3.35 1.1 3.45"
        rotation="0 90 0">
        <a-plane
          width="0.5"
          height="0.2"
          color="#222222"
          opacity="0.85"
          class="clickable"
          cursor-listener>
        </a-plane>
        <a-text
          value="Volver al pasillo"
          align="center"
          color="#FFFFFF"
          width="1.8"
          position="0 0 0.01">
        </a-text>
      </a-entity>

      <!-- ============================================================ -->
      <!-- Botón 2 - Cambiar: texto en value="" y destino en el script  -->
      <!-- ============================================================ -->
      <a-entity
        id="boton-2"
        position="6.412 1.268 1.461"
        rotation="0 0 0">
        <a-plane
          width="0.5"
          height="0.2"
          color="#222222"
          opacity="0.85"
          class="clickable"
          cursor-listener>
        </a-plane>
        <a-text
          value="Destino 2"
          align="center"
          color="#FFFFFF"
          width="1.8"
          position="0 0 0.01">
        </a-text>
      </a-entity>

      <!-- ============================================================ -->
      <!-- Botón 3 - Cambiar: texto en value="" y destino en el script  -->
      <!-- ============================================================ -->
      <a-entity
        id="boton-3"
        position="15.0 1.268 5.511"
        rotation="0 180 0">
        <a-plane
          width="0.5"
          height="0.2"
          color="#222222"
          opacity="0.85"
          class="clickable"
          cursor-listener>
        </a-plane>
        <a-text
          value="Destino 3"
          align="center"
          color="#FFFFFF"
          width="1.8"
          position="0 0 0.01">
        </a-text>
      </a-entity>

      <!-- Floor plane for reference (can be invisible) -->
      <a-plane 
        position="0 0.01 0" 
        rotation="-90 0 0" 
        width="100" 
        height="100" 
        color="#888888"
        visible="false"
        shadow="receive: true">
      </a-plane>

      <!-- Player Rig with Movement Controls -->
      <a-entity 
        id="player-rig"
        movement-controls="speed: 0.15; fly: false; constrains: { min: {y: 0}, max: {y: 10} }"
        position="0 0 5">
        
        <!-- Camera -->
        <a-entity 
          id="camera"
          camera 
          position="0 1.6 0" 
          look-controls="pointerLockEnabled: true"
          wasd-controls="enabled: false; acceleration: 30">
          <a-cursor 
            color="#FFF" 
            opacity="0.5"
            scale="0.4 0.4 0.4"
            fuse="false">
          </a-cursor>
        </a-entity>
        
        <a-sphere 
          radius="0.5" 
          position="0 0 0" 
          visible="false"
          class="player-collider">
        </a-sphere>
        
      </a-entity>

      <!-- Lighting -->
      <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; color: #FFFFFF; intensity: 0.8" position="-1 2 1" cast-shadow="true"></a-entity>

      <!-- Sky -->
      <a-sky color="#1a1a2e"></a-sky>

      <!-- Instructions UI -->
      <div style="position: fixed; top: 20px; left: 20px; color: white; font-family: Arial; z-index: 999; pointer-events: none;">
        <p><strong>Controls:</strong></p>
        <p>W/A/S/D - Move</p>
        <p>Mouse - Look around</p>
        <p>Click to lock cursor</p>
      </div>

    </a-scene>

    <script>
      // ── Botón 1 ──────────────────────────────────────────────
      const btn1 = document.querySelector('#boton-escaleras');
      btn1.addEventListener('click', () => window.location.href = 'pasillo-2.html');
      const plane1 = btn1.querySelector('a-plane');
      plane1.addEventListener('mouseenter', () => plane1.setAttribute('color', '#444444'));
      plane1.addEventListener('mouseleave', () => plane1.setAttribute('color', '#222222'));

      // ── Botón 2 ── CAMBIA EL ARCHIVO HTML AQUÍ ───────────────
      const btn2 = document.querySelector('#boton-2');
      btn2.addEventListener('click', () => window.location.href = 'ARCHIVO-2.html');
      const plane2 = btn2.querySelector('a-plane');
      plane2.addEventListener('mouseenter', () => plane2.setAttribute('color', '#444444'));
      plane2.addEventListener('mouseleave', () => plane2.setAttribute('color', '#222222'));

      // ── Botón 3 ── CAMBIA EL ARCHIVO HTML AQUÍ ───────────────
      const btn3 = document.querySelector('#boton-3');
      btn3.addEventListener('click', () => window.location.href = 'ARCHIVO-3.html');
      const plane3 = btn3.querySelector('a-plane');
      plane3.addEventListener('mouseenter', () => plane3.setAttribute('color', '#444444'));
      plane3.addEventListener('mouseleave', () => plane3.setAttribute('color', '#222222'));
    </script>

  </body>
</html>
