<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Habitacion VR</title>
    <meta name="description" content="Habitacion VR with A-Frame">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── HOTBAR ── */
      #hotbar {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 1000;
        pointer-events: none;
        font-family: 'Rajdhani', sans-serif;
      }

      .hotbar-slot {
        width: 72px;
        height: 72px;
        background: rgba(0, 0, 0, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        overflow: hidden;
      }

      .hotbar-slot.has-item {
        border-color: rgba(255, 200, 60, 0.75);
        background: rgba(20, 15, 0, 0.82);
        box-shadow: 0 0 12px rgba(255, 180, 0, 0.3), inset 0 0 20px rgba(255,180,0,0.04);
      }

      .hotbar-slot .slot-number {
        position: absolute;
        top: 4px;
        left: 7px;
        font-size: 11px;
        color: rgba(255,255,255,0.4);
        font-weight: 700;
        line-height: 1;
      }

      .hotbar-slot .slot-icon {
        font-size: 28px;
        line-height: 1;
        opacity: 0;
        transform: scale(0.6);
        transition: opacity 0.3s, transform 0.3s;
        filter: drop-shadow(0 0 5px rgba(255,200,60,0.5));
      }

      .hotbar-slot.has-item .slot-icon {
        opacity: 1;
        transform: scale(1);
      }

      .hotbar-slot .slot-label {
        font-size: 9px;
        color: rgba(255, 200, 60, 0.9);
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-top: 4px;
        opacity: 0;
        transition: opacity 0.3s;
        text-transform: uppercase;
        text-align: center;
        padding: 0 3px;
        line-height: 1.1;
      }

      .hotbar-slot.has-item .slot-label {
        opacity: 1;
      }

      /* ── PICKUP NOTICE ── */
      #pickup-notice {
        position: fixed;
        bottom: 105px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(0,0,0,0.78);
        color: #ffc83c;
        font-family: 'Rajdhani', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 7px 22px;
        border-radius: 4px;
        border: 1px solid rgba(255,200,60,0.4);
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        transition: opacity 0.3s, transform 0.3s;
        white-space: nowrap;
      }

      #pickup-notice.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0px);
      }

      /* ── INTERACT HINT ── */
      #interact-hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, calc(-50% + 38px));
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.09em;
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
        text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        transition: opacity 0.2s;
        text-transform: uppercase;
        background: rgba(0,0,0,0.55);
        padding: 4px 14px;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.12);
      }

      #interact-hint.show { opacity: 1; }

      /* ── INSTRUCTIONS ── */
      #instructions {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: 'Rajdhani', sans-serif;
        z-index: 999;
        pointer-events: none;
        font-size: 14px;
        line-height: 1.8;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      }

      #instructions strong {
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #ffc83c;
        display: block;
        margin-bottom: 2px;
      }

      /* ── TIMER ── */
      #timer {
        position: fixed;
        top: 20px;
        right: 20px;
        color: #ff4444;
        font-family: 'Rajdhani', sans-serif;
        font-size: 24px;
        font-weight: 700;
        z-index: 999;
        pointer-events: none;
        text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        background: rgba(0,0,0,0.5);
        padding: 5px 15px;
        border-radius: 4px;
        border: 1px solid rgba(255,68,68,0.5);
      }

      #timer.warning { color: #ff8800; border-color: rgba(255,136,0,0.5); }
      #timer.critical { color: #ff0000; animation: pulse 0.5s infinite; border-color: rgba(255,0,0,0.8); }
      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
  </head>
  <body>
    <a-scene>
      
      <!-- Assets -->
      <a-assets>
        <a-asset-item id="habitacion-model" src="models/armeria.glb"></a-asset-item>
        <a-asset-item id="door-model" src="models/puerta.glb"></a-asset-item>
        <a-asset-item id="crowbar-model" src="models/crowbar.glb"></a-asset-item>
      </a-assets>

      <!-- Room Model -->
      <a-entity 
        id="habitacion"
        gltf-model="#habitacion-model"
        position="0, 0, 7.25"
        scale="2 2 2"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Crowbar Model (now pickable) -->
      <a-entity
        id="crowbar"
        gltf-model="#crowbar-model"
        position="-1.396 0.579 5.877"
        rotation="0 45 20"
        scale="0.005 0.005 0.005"
        shadow="cast: true; receive: true"
        class="pickable clickable"
        data-item="crowbar"
        data-label="Crowbar"
        data-icon="🔨">
      </a-entity>

      <!-- Button to open door -->
      <a-entity
        id="boton-puerta"
        position="0.089 1.2 4.616"
        rotation="0 45 0">
        
        <a-plane
          width="0.8"
          height="0.3"
          color="#222222"
          opacity="0.85"
          class="clickable"
          door-click>
        </a-plane>

        <a-text
          value="Abrir Puerta"
          align="center"
          color="#FFFFFF"
          width="2"
          position="0 0 0.01">
        </a-text>
        
      </a-entity>

      <!-- Keycard (recogible) -->
      <a-entity 
        id="keycard-1"
        gltf-model="#keycard-model"
        position="1.5 0.3 5.5"
        rotation="90 270 -90"
        scale="2 2 2"
        class="pickable"
        data-item="keycard"
        data-label="Keycard"
        data-icon="💳"
        shadow="cast: true; receive: true">
      </a-entity>

      <a-box class="wall" position="-3.62 1 8.703" rotation="0 -50 0" width="10" height="3" depth="0.5" visible="false"></a-box>
      <a-box class="wall" position="1.4 1 5" rotation="0 -50 0" width="10" height="3" depth="0.5" visible="false"></a-box>
      <a-box class="wall" position="1.448 1 9.279" rotation="0 -50 0" width="0.5" height="3" depth="10" visible="false"></a-box>
      <a-box class="wall" position="-2.16 1 5.812" rotation="0 -50 0" width="0.5" height="3" depth="10" visible="false"></a-box>
      <!-- Keycard Level 2 (recogible) -->
      <a-entity 
        id="keycard-level2"
        gltf-model="#keycard-level2-model"
        position="-1.5 0.3 5.5"
        rotation="90 270 -90"
        scale="1 1 1"
        class="pickable"
        data-item="keycard-level2"
        data-label="Keycard Nivel 2"
        data-icon="🔑"
        shadow="cast: true; receive: true">
      </a-entity>

      <!-- Floor plane -->
      <a-plane 
        position="0 0.01 0" 
        rotation="-90 0 0" 
        width="100" 
        height="100" 
        color="#888888"
        visible="false"
        shadow="receive: true">
      </a-plane>

      <!-- Player Rig -->
<a-entity id="player-rig" movement-controls="speed: 0.15; fly: false;" position="0 0 5">

  <a-entity id="camera"
            camera
            position="0 1.6 0"
            look-controls="pointerLockEnabled: true">

    <a-cursor
      id="cursor"
      color="#FFF"
      opacity="0.5"
      scale="0.4 0.4 0.4"
      fuse="false"
      raycaster="objects: .pickable, .clickable; far: 0.5">
    </a-cursor>

    <a-entity id="sensor"
      raycaster="objects: .wall; far: 0.6; showLine: false">
    </a-entity>

  </a-entity>

</a-entity>
      <!-- Lighting -->
      <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; color: #FFFFFF; intensity: 0.8" position="-1 2 1" cast-shadow="true"></a-entity>

      <!-- Sky -->
      <a-sky color="#1a1a2e"></a-sky>

      <!-- Instructions UI -->
    <div id="instructions">
      <strong>CONTROLES</strong>
      W/A/S/D — Moverse<br>
      Ratón — Mirar<br>
      E — Recoger / Interactuar<br>
      Click — Bloquear cursor
    </div>

    </a-scene>

    <!-- ── HOTBAR ── -->
    <div id="hotbar">
      <div class="hotbar-slot" id="slot-1">
        <span class="slot-number">1</span>
        <span class="slot-icon" id="slot-1-icon"></span>
        <span class="slot-label" id="slot-1-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-2">
        <span class="slot-number">2</span>
        <span class="slot-icon" id="slot-2-icon"></span>
        <span class="slot-label" id="slot-2-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-3">
        <span class="slot-number">3</span>
        <span class="slot-icon" id="slot-3-icon"></span>
        <span class="slot-label" id="slot-3-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-4">
        <span class="slot-number">4</span>
        <span class="slot-icon" id="slot-4-icon"></span>
        <span class="slot-label" id="slot-4-label"></span>
      </div>
      <div class="hotbar-slot" id="slot-5">
        <span class="slot-number">5</span>
        <span class="slot-icon" id="slot-5-icon"></span>
        <span class="slot-label" id="slot-5-label"></span>
      </div>
    </div>

    <div id="pickup-notice"></div>
    <div id="interact-hint">[ E ] Recoger</div>

    <!-- instructions removed to avoid overlap with escalera page -->
    <div id="timer"></div>

    <script>
      // ─────────────────────────────────────────
      //  PERSISTENT GAME STATE (localStorage)
      // ─────────────────────────────────────────
      const GAME_STORAGE_KEY = 'titanic_game_state';
      const TIMER_DURATION = 5 * 60 * 1000; // 5 minutes

      function loadGameState() {
        const saved = localStorage.getItem(GAME_STORAGE_KEY);
        if (saved) return JSON.parse(saved);
        const newState = { startTime: Date.now(), inventory: [] };
        localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(newState));
        return newState;
      }

      function saveGameState(state) {
        localStorage.setItem(GAME_STORAGE_KEY, JSON.stringify(state));
      }

      const gameState = loadGameState();
      let inventory = gameState.inventory || [];
      const SLOT_COUNT = 5;
      let timeRemaining = TIMER_DURATION;
      let timerInterval = null;

      function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }

      function updateTimerDisplay() {
        const timerEl = document.getElementById('timer');
        if (!timerEl) return;
        timerEl.textContent = formatTime(timeRemaining);
        timerEl.classList.remove('warning', 'critical');
        if (timeRemaining <= 60000) timerEl.classList.add('critical');
        else if (timeRemaining <= 120000) timerEl.classList.add('warning');
      }

      function startTimer() {
        const elapsed = Date.now() - gameState.startTime;
        timeRemaining = Math.max(0, TIMER_DURATION - elapsed);
        updateTimerDisplay();
        timerInterval = setInterval(() => {
          timeRemaining -= 1000;
          updateTimerDisplay();
          gameState.startTime = Date.now() - (TIMER_DURATION - timeRemaining);
          saveGameState(gameState);
          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            alert('¡TIEMPO AGOTADO! El barco se hunde...');
            localStorage.removeItem(GAME_STORAGE_KEY);
            window.location.href = 'juego.html';
          }
        }, 1000);
      }

      function updateHotbar() {
        for (let i = 0; i < SLOT_COUNT; i++) {
          const slot = document.getElementById(`slot-${i + 1}`);
          const iconEl = document.getElementById(`slot-${i + 1}-icon`);
          const labelEl = document.getElementById(`slot-${i + 1}-label`);
          const entry = inventory[i];
          if (entry) {
            slot.classList.add('has-item');
            iconEl.textContent = entry.icon;
            labelEl.textContent = entry.label;
          } else {
            slot.classList.remove('has-item');
            iconEl.textContent = '';
            labelEl.textContent = '';
          }
        }
      }

      function saveInventory() {
        gameState.inventory = inventory;
        saveGameState(gameState);
      }

      let noticeTimer = null;
      function showNotice(text) {
        const el = document.getElementById('pickup-notice');
        el.textContent = text;
        el.classList.add('show');
        if (noticeTimer) clearTimeout(noticeTimer);
        noticeTimer = setTimeout(() => el.classList.remove('show'), 2400);
      }

      function pickupItem(entity) {
        const item = entity.getAttribute('data-item');
        const label = entity.getAttribute('data-label');
        const icon = entity.getAttribute('data-icon');
        if (!item) return;
        if (inventory.find(e => e.item === item)) return;
        if (inventory.length >= SLOT_COUNT) {
          showNotice('⚠  Inventario lleno');
          return;
        }
        inventory.push({ item, label, icon });
        entity.setAttribute('visible', 'false');
        entity.classList.remove('pickable');
        entity.removeAttribute('class');
        updateHotbar();
        saveInventory();
        showNotice(`+  ${icon}  ${label} guardado`);
      }

      const hint = document.getElementById('interact-hint');
      let hoveredPickable = null;

      document.addEventListener('keydown', (e) => {
        if ((e.key === 'e' || e.key === 'E') && hoveredPickable) {
          pickupItem(hoveredPickable);
          hoveredPickable = null;
          hint.classList.remove('show');
        }
      });

      AFRAME.registerComponent('door-click', {
        init: function () {
          this.el.addEventListener('click', function () {
            window.location.href = 'escaleras-3.html';
          });
          this.el.addEventListener('mouseenter', function () { this.setAttribute('color', '#444444'); });
          this.el.addEventListener('mouseleave', function () { this.setAttribute('color', '#222222'); });
        }
      });

      document.querySelector('a-scene').addEventListener('loaded', () => {
        function registerPickable(el) {
          const itemName = el.getAttribute('data-item');
          // skip if already in inventory or element not visible
          if (inventory.find(i => i.item === itemName) || el.getAttribute('visible') === 'false') return;

          const enterFn = function () {
            hoveredPickable = this;
            hint.textContent = `[ E ]  Recoger ${this.getAttribute('data-label')}`;
            hint.classList.add('show');
          };
          const leaveFn = function () {
            if (hoveredPickable === this) { hoveredPickable = null; hint.classList.remove('show'); }
          };
          const clickFn = function () {
            pickupItem(this);
            hoveredPickable = null;
            hint.classList.remove('show');
            // detach listeners so it cannot be reactivated
            this.removeEventListener('mouseenter', enterFn);
            this.removeEventListener('mouseleave', leaveFn);
            this.removeEventListener('click', clickFn);
          };

          el.addEventListener('mouseenter', enterFn);
          el.addEventListener('mouseleave', leaveFn);
          el.addEventListener('click', clickFn);
        }

        document.querySelectorAll('.pickable').forEach(registerPickable);

        // Hide already collected items
        inventory.forEach(item => {
          const el = document.querySelector(`[data-item="${item.item}"]`);
          if (el) el.setAttribute('visible', 'false');
        });
      });
const rig = document.querySelector('#player-rig');
const sensor = document.querySelector('#sensor');
let lastValidPosition = new THREE.Vector3();

AFRAME.registerComponent('col-check', {
  tick: function () {

    const raycaster = sensor.components.raycaster;
    if (!raycaster) return;

    const currentPosition = rig.object3D.position;

    const movementDirection = new THREE.Vector3()
      .copy(currentPosition)
      .sub(lastValidPosition)
      .normalize();

    if (movementDirection.length() > 0) {

      sensor.setAttribute('raycaster', 'direction',
        movementDirection.x + ' ' +
        movementDirection.y + ' ' +
        movementDirection.z
      );

      if (raycaster.intersections.length > 0) {
        rig.object3D.position.copy(lastValidPosition);
      } else {
        lastValidPosition.copy(currentPosition);
      }

    } else {
      lastValidPosition.copy(currentPosition);
    }
  }
});

document.querySelector('a-scene').setAttribute('col-check', '');
      updateHotbar();
      startTimer();
    </script>

  </body>
</html>
